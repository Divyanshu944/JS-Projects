<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="main">
     
            <div class="header">
                <div class="logo-wrapper">
                    <div class="logo">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </div>
                    <h1>AI Image Generator</h1>
                </div>
                <button class="them-logo">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
           
            <div class="main-content">
                <form action="#" class="prompt-form">
                     <div class="main-container">
                <div class="prompt-container">
                    <textarea name="" placeholder="Desribe your imagination in detail..." id=""></textarea>
                <button type="button" class="suggestion-icon"><i class="fa-solid fa-dice"></i></button>
                </div>
            </div>
            
                    <div class="prompt-action">
                    <div class="select-wrapper">
                        <select name="" id="" class="custom-select" required>
                            <option value="" selected disabled>Select Model</option>
                            <option value="FLUX.1-dev" class="">FLUX.1-dev</option>
                            <option value="FLUX.1-schnell" class="">FLUX.1-schnell</option>
                            <option value="Stable Diffusion XL" class="">Stable Diffusion XL</option>
                            <option value="Stable Diffusion v1.5" class="">Stable Diffusion v1.5</option>
                            <option value="Stable Diffusion 3" class="">Stable Diffusion 3</option>
                            <option value="Openjourney" class="">Openjourney</option>
                        </select>
                    </div>

                    <div class="select-wrapper">
                        <select name="" id="" class="custom-select" required>
                            <option value="" class="img" selected disabled>Image Count</option>
                            <option value="1" class="img">1 Image</option>
                            <option value="2" class="img">2 Image</option>
                            <option value="3" class="img">3 Image</option>
                            <option value="4" class="img">4 Image</option>
                        </select>
                    </div>

                    <div class="selecte-wrapper"> 
                        
                        <select name="" id="" class="custom-select" required>
                            <option value="" class="" selected disabled>Aspect Ratio</option>
                            <option value="1/1" class="">Square(1:1)</option>
                            <option value="16/9" class="">Landscape(16:9)</option>
                            <option value="9/16" class="">Portrait(9:16)</option>
                        </select>
                    </div>

                    <button type="submit" class="generate-btn">
                        <i class="fa-solid fa-wand-sparkles"></i>
                        Generate
                    </button>
                </div>

                <div class="gallary-grid">
                    <div class="img-card">
                        <img src="test.png" class="result-img" alt="">
                        <div class="image-overlay">
                            <button class="img-download-btn">
                                <i class="fa-solid fa-download"></i>
                            </button>
                        </div>
                    </div>
                    <div class="img-card">
                        <img src="test.png" class="result-img" alt="">
                        <div class="image-overlay">
                            <button class="img-download-btn">
                                <i class="fa-solid fa-download"></i>
                            </button>
                        </div>
                    </div>
                    <div class="img-card">
                        <img src="test.png" class="result-img" alt="">
                        <div class="image-overlay">
                            <button class="img-download-btn">
                                <i class="fa-solid fa-download"></i>
                            </button>
                        </div>
                    </div>
                    <div class="img-card">
                        <img src="test.png" class="result-img" alt="">
                        <div class="image-overlay">
                            <button class="img-download-btn">
                                <i class="fa-solid fa-download"></i>
                            </button>
                        </div>
                    </div>
                </div>
                </form>
            </div>
       

    </div>
</body>
</html>
